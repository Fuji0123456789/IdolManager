spring.application.name=idol-photo-manager
# 1. データベース接続設定 (SQL Server)
# [server-name] は通常 localhost です。
# [database-name] は先にSQLで作成したDB名に合わせてください。
#spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=IdolPhotoDB;encrypt=true;trustServerCertificate=true;
#spring.datasource.username=sa
#spring.datasource.password=YourStrongPassword123
# encrypt=true;trustServerCertificate=true: ローカル環境でSSL証明書エラーを回避するために必要な記述です。
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=databaseIdolManager01;encrypt=true;trustServerCertificate=true;
spring.datasource.username=loginIdolManager01
spring.datasource.password=
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. JPA / Hibernate 設定
# SQLログを出力する設定（デバッグ時に便利です）
spring.jpa.show-sql=true
# ddl-auto=none: すでにSQLでテーブルを作成済みのため、自動生成（update等）はオフにしています。
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# 3. アップロード・スキャン対象のローカルフォルダ設定 (独自設定)
# Googleフォトからダウンロードした画像を置くフォルダのフルパスを指定
# app.scan.folder-path: ここに指定したパスをJavaコード側で読み取って、未登録ファイルの検索を行います。
app.scan.folder-path=C:/Users/user/Pictures/IdolPhotos/

# 4. セキュリティ設定 (ログイン後のリダイレクト先など)
spring.security.user.name=admin
spring.security.user.password=password

# 5. 日本語の文字化け防止
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 6. 静的リソースの設定
# ローカルの画像ファイルをブラウザで表示するための設定（必要に応じて調整）
spring.web.resources.static-locations=file:${app.scan.folder-path},classpath:/static/
