<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>ユーザ登録</title></head>
<body>
	<div class="container">
    <h1>新規ユーザ登録</h1>
    <form th:action="@{/register}" th:object="${userRegistrationForm}" method="post">
        <div class="form-group">
            <label>ユーザ名:</label>
            <input type="text" th:field="*{username}">
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red;"></p>
        </div>
        <div class="form-group">
            <label>パスワード:</label>
            <input type="password" th:field="*{password}">
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></p>
        </div>
        <button type="submit">登録する</button>
    </form>
	</div>
    <p><a th:href="@{/login}">ログイン画面へ戻る</a></p>
</body>
</html>
